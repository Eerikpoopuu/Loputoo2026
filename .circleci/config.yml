version: 2.1

jobs:
  build-frontend:
    docker:
      - image: cimg/node:20.4
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Build frontend
          command: |
            cd frontend
            npm install
            npm run build

  build-backend:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install backend dependencies
          command: pip install -r backend/requirements.txt
      - run:
          name: Run backend tests
          command: pytest tests/

workflows:
  version: 2
  build_and_test:
    jobs:
      - build-frontend
      - build-backend
