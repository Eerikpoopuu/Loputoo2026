version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.4   # frontend
      - image: cimg/python:3.12 # backend
    working_directory: ~/repo
    steps:
      - checkout

      - run:
          name: Build frontend
          command: |
            cd frontend
            npm install
            npm run build

      - run:
          name: Install backend dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install -r requirements.txt

      - run:
          name: Run backend tests
          command: |
            . venv/bin/activate
            pytest

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
